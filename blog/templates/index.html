{% extends "base.html" %}

{% block content %}

<h1>Posty</h1>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Tytuł</th>
            <th>Treść</th>
            <th>Status</th>
            <th>Data</th>
            <th>Akcje</th>
        </tr>
    </thead>

    <tbody>
        {% for post in posts %}

        <tr>
            <td>{{ post.title }}</td>

            <td>{{ post.content[:150] }}...</td>    
            
            <td>
                {% if post.is_published %}
                    <span class="badge badge-success">Opublikowany</span>
                {% else %}
                    <span class="badge badge-secondary">Draft</span>
                {% endif %}
            </td>

            <td>{{ post.created_at.strftime('%d.%m.%Y') }}</td>

            <td>
                <a href="/edit-post/{{ post.id }}" class="btn btn-sm btn-primary">
                    Edytuj
                </a>

                <form action="/delete-post/{{ post.id }}" method="POST" style="display:inline;">
                    <button class="btn btn-sm btn-danger">
                        Usuń
                    </button>
                </form>
            </td>

        </tr>

        {% endfor %}
    </tbody>

</table>

{% endblock %}
